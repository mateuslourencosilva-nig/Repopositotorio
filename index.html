
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    max-width:95%;
    display:grid;
    grid-template-columns:1fr 300px;
    gap:20px;
}

.game{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.score{
    font-size:40px;
    margin:20px 0;
    font-weight:bold;
}

#clickBtn{
    width:220px;
    height:220px;
    border:none;
    border-radius:50%;
    font-size:28px;
    cursor:pointer;
    background:#facc15;
    transition:.1s;
    box-shadow:0 10px #ca8a04;
}

#clickBtn:hover{
    transform:scale(1.05);
}

#clickBtn:active{
    transform:translateY(8px);
    box-shadow:0 2px #ca8a04;
}

.shop{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

.item{
    background:#334155;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
}

.item button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.item button:hover{
    background:#16a34a;
}

.stats{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

<div class="game">

<h1>🍪 Clicker Game</h1>

<div class="score">
<span id="score">0</span> moedas
</div>

<button id="clickBtn">CLIQUE</button>

<div class="stats">
<p>Moedas por clique: <span id="clickPower">1</span></p>
<p>Moedas por segundo: <span id="cps">0</span></p>
</div>

</div>

<div class="shop">

<h2>🛒 Loja</h2>

<div class="item">
<b>Cursor</b><br>
+1 por clique<br>
Preço: <span id="cursorPrice">10</span>
<button onclick="buyCursor()">Comprar</button>
</div>

<div class="item">
<b>Fazenda</b><br>
+1 por segundo<br>
Preço: <span id="farmPrice">50</span>
<button onclick="buyFarm()">Comprar</button>
</div>

<div class="item">
<b>Fábrica</b><br>
+10 por segundo<br>
Preço: <span id="factoryPrice">300</span>
<button onclick="buyFactory()">Comprar</button>
</div>

<div class="item">
<button onclick="saveGame()">💾 Salvar</button>
</div>

<div class="item">
<button onclick="resetGame()">🗑 Reiniciar</button>
</div>

</div>

</div>

<script>

let score = 0;

let clickPower = 1;

let cps = 0;

let cursorPrice = 10;
let farmPrice = 50;
let factoryPrice = 300;

function update(){

document.getElementById("score").innerText=Math.floor(score);
document.getElementById("clickPower").innerText=clickPower;
document.getElementById("cps").innerText=cps;

document.getElementById("cursorPrice").innerText=cursorPrice;
document.getElementById("farmPrice").innerText=farmPrice;
document.getElementById("factoryPrice").innerText=factoryPrice;

}

document.getElementById("clickBtn").onclick=()=>{

score+=clickPower;
update();

};

function buyCursor(){

if(score>=cursorPrice){

score-=cursorPrice;
clickPower++;

cursorPrice=Math.floor(cursorPrice*1.5);

update();

}

}

function buyFarm(){

if(score>=farmPrice){

score-=farmPrice;
cps+=1;

farmPrice=Math.floor(farmPrice*1.6);

update();

}

}

function buyFactory(){

if(score>=factoryPrice){

score-=factoryPrice;
cps+=10;

factoryPrice=Math.floor(factoryPrice*1.8);

update();

}

}

setInterval(()=>{

score+=cps;

update();

},1000);

function saveGame(){

const save={
score,
clickPower,
cps,
cursorPrice,
farmPrice,
factoryPrice
};

localStorage.setItem("clickerSave",JSON.stringify(save));

alert("Jogo salvo!");

}

function loadGame(){

const save=localStorage.getItem("clickerSave");

if(save){

const data=JSON.parse(save);

score=data.score;
clickPower=data.clickPower;
cps=data.cps;
cursorPrice=data.cursorPrice;
farmPrice=data.farmPrice;
factoryPrice=data.factoryPrice;

}

update();

}

function resetGame(){

if(confirm("Deseja apagar o progresso?")){

localStorage.removeItem("clickerSave");
location.reload();

}

}

loadGame();

</script>

</body>
</html>
