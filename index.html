<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Estilizada</title>
    
    <style>
        /* Estilização do Cabeçalho */
        header {
            background-color: #183C63; /* Azul marinho com bom contraste */
            color: #FFFFFF;            /* Texto branco */
            padding: 20px;             /* Espaçamento interno para o texto não colar nas bordas */
        }

        /* Estilização do Conteúdo Principal */
        main {
            background-color: #FFFFFF; /* Fundo branco */
            color: #183C63;            /* Texto em azul marinho */
            text-align: center;        /* Centraliza o texto */
            max-width: 800px;          /* Define a largura máxima da caixa */
            margin: 0 auto;            /* Margem 0 em cima/baixo e AUTO dos lados para centralizar o bloco */
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Título do Meu Site</h1>
    </header>

    <main>
        <h2>Meu Primeiro Post</h2>
        <p>Este é o conteúdo principal da página. Graças ao CSS que adicionamos, ele não fica mais espalhado em telas grandes; agora ele respeita o limite de 800 pixels e fica perfeitamente centralizado na tela, com um contraste excelente para leitura!</p>
    </main>

</body>
</html>
